summary: 08A Worker - send webinar WhatsApp reminders
description: Reusable worker for webinar reminder jobs scheduled by the Calendly
  to Zoom/Pipedrive flow. For a targeted deal, it reads the open webinar
  activity date/time and sends the due approved Interakt webinar reminder. Each
  send is logged as a done Pipedrive activity for dedupe.
lock: '!inline f/sales/send_webinar_reminders.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    deal_id:
      type: number
      description: Optional deal id for targeted dry runs.
      default: null
    dry_run:
      type: boolean
      description: Preview reminders without sending WhatsApp messages or logging
        activities.
      default: true
    include_already_logged:
      type: boolean
      description: Include reminders that already have a matching Pipedrive activity.
      default: false
    max_deals:
      type: integer
      description: Maximum number of open Pipedrive deals to scan per run.
      default: 500
    max_late_minutes:
      type: integer
      description: Send only if the scheduled reminder time is within this many
        minutes in the past.
      default: 60
    now_iso:
      type: string
      description: Optional ISO timestamp override for dry-run testing.
      default: ''
      originalType: string
    timezone:
      type: string
      description: Reserved for future local date/time rendering.
      default: null
  required: []
